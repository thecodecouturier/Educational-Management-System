<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - نظام إدارة تعليمى</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* تطبيق ثيم financial-analytics الكامل على صفحة تسجيل الدخول */
    
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background pattern overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 450px;
      text-align: center;
      position: relative;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .logo-section {
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
      color: white;
      transition: all 0.3s ease;
    }

    .logo-icon:hover {
      transform: scale(1.05) rotate(5deg);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
    }

    .system-title {
      font-size: 2rem;
      font-weight: 700;
      color: #2d3748;
      margin: 0 0 0.5rem 0;
      text-align: center;
    }

    .system-subtitle {
      font-size: 1rem;
      color: #718096;
      margin: 0 0 2rem 0;
      font-weight: 500;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: right;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #4a5568;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
      background: #f7fafc;
      color: #2d3748;
      font-weight: 500;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    .form-input::placeholder {
      color: #a0aec0;
      font-weight: 400;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .login-btn:hover {
      background: linear-gradient(135deg, #5a67d8 0%, #6b42a0 100%);
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.35);
    }

    .error-message {
      background: #fff5f5;
      color: #c53030;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      border: 2px solid #feb2b2;
      display: none;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 5px 15px rgba(197, 48, 48, 0.1);
      text-align: center;
    }

    .success-message {
      background: #f0fff4;
      color: #2f855a;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      border: 2px solid #9ae6b4;
      display: none;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 5px 15px rgba(47, 133, 90, 0.1);
      text-align: center;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .loading .login-btn {
      background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
      cursor: not-allowed;
    }

    /* تحسينات للموبايل */
    @media (max-width: 480px) {
      .login-container {
        margin: 20px;
        padding: 2rem 1.5rem;
      }
      
      .system-title {
        font-size: 1.5rem;
      }
      
      .logo-icon {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container card-like">
    <!-- اللوجو والعنوان -->
    <div class="logo-section">
      <div class="logo-icon">
        <i class="fa-solid fa-graduation-cap" style="color: white;"></i>
      </div>
      <h1 class="system-title">نظام إدارة تعليمى</h1>
      <p class="system-subtitle">تسجيل الدخول للوحة التحكم</p>
    </div>

    <!-- رسائل النجاح والخطأ -->
  <div id="errorMessage" class="error-message alert alert-danger"></div>
  <div id="successMessage" class="success-message alert alert-success"></div>

    <!-- نموذج تسجيل الدخول -->
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" class="form-input" required autocomplete="username" placeholder="أدخل اسم المستخدم">
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" class="form-input" required autocomplete="current-password" placeholder="أدخل كلمة المرور">
      </div>

      <button type="submit" class="login-btn btn-primary">
        <span id="loginBtnText">تسجيل الدخول</span>
      </button>
    </form>
  </div>

  <script>
    // نموذج تسجيل الدخول
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const loginBtn = document.querySelector('.login-btn');
      const loginBtnText = document.getElementById('loginBtnText');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const container = document.querySelector('.login-container');
      
      // التحقق من البيانات
      if (!username || !password) {
        showError('يرجى إدخال اسم المستخدم وكلمة المرور');
        return;
      }
      
      // بدء التحميل
      container.classList.add('loading');
      loginBtnText.textContent = 'جاري التحقق...';
      hideMessages();
      
      try {
        // إرسال طلب تسجيل الدخول
        const response = await fetch('http://localhost:3001/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const result = await response.json();
        
        if (response.ok) {
          // نجح تسجيل الدخول
          showSuccess('تم تسجيل الدخول بنجاح!');
          
          // حفظ بيانات المستخدم
          localStorage.setItem('user', JSON.stringify(result.user));
          localStorage.setItem('isLoggedIn', 'true');
          
          // الانتقال للصفحة الرئيسية
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
          
        } else {
          // فشل تسجيل الدخول
          showError(result.error || 'خطأ في تسجيل الدخول');
        }
        
      } catch (error) {
        console.error('خطأ في الشبكة:', error);
        showError('خطأ في الاتصال بالخادم');
      } finally {
        // إنهاء التحميل
        container.classList.remove('loading');
        loginBtnText.textContent = 'تسجيل الدخول';
      }
    });
    
    // دالة إظهار رسالة خطأ
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      hideSuccess();
    }
    
    // دالة إظهار رسالة نجاح
    function showSuccess(message) {
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      hideError();
    }
    
    // إخفاء الرسائل
    function hideMessages() {
      hideError();
      hideSuccess();
    }
    
    function hideError() {
      document.getElementById('errorMessage').style.display = 'none';
    }
    
    function hideSuccess() {
      document.getElementById('successMessage').style.display = 'none';
    }
    
    // التحقق من حالة تسجيل الدخول
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
    
    // تركيز على حقل اسم المستخدم عند تحميل الصفحة
    window.addEventListener('load', () => {
      document.getElementById('username').focus();
    });
    
    console.log('🔐 صفحة تسجيل الدخول جاهزة');
  </script>
</body>
</html>
